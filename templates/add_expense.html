<!DOCTYPE html>
<html>
<head>
<title>Add Expense</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTX1M1xEdRnfnybSWW8VQS95X1cEA3s7SzmnQ&s") no-repeat center/cover;
}

.container{
    width:500px;
    margin:80px auto;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    font-weight:600;
}

select,input,textarea{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-family:'Poppins',sans-serif;
}

textarea{
    resize:none;
    height:80px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e8449;
}

.back-btn{
    margin-top:10px;
    background:#3498db;
}

.back-btn:hover{
    background:#2c80b4;
}

</style>
</head>

<body>

{% include "navbar.html" %}

<div class="container">

<h2>Add Expense</h2>

<form method="POST">

<label>Select Farmer</label>
<select name="farmer_id" required>
{% for farmer in farmers %}
<option value="{{ farmer['id'] }}">{{ farmer['name'] }}</option>
{% endfor %}
</select>

<label>Expense Type</label>
<input type="text" name="expense_type" placeholder="Example: Fertilizer, Seeds" required>

<label>Amount (₹)</label>
<input type="number" step="0.01" name="amount" required>

<label>Description</label>
<textarea name="description" placeholder="Optional notes..."></textarea>

<button type="submit">Add Expense</button>

</form>

<a href="/expenses">
<button class="back-btn">View Expenses</button>
</a>

</div>

</body>
</html>

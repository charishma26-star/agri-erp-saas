<!DOCTYPE html>
<html>
<head>
    <title>Add Crop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin:0;
            background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTX1M1xEdRnfnybSWW8VQS95X1cEA3s7SzmnQ&s") no-repeat center center/cover;
        }

        .container {
            width: 50%;
            margin: 80px auto;
            padding: 40px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            text-align:center;
            color:white;
        }

        input, select {
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:10px;
            border:none;
        }

        button {
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2ecc71;
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover {
            background:#27ae60;
            transform:scale(1.05);
        }

        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
        }
    </style>
</head>
<body>

{% include "navbar.html" %}

<div class="container">

{% if step == 1 %}
<h2>Verify Farmer</h2>
<form method="POST">
    <input type="hidden" name="verify_farmer">

    <input type="text" name="farmer_name" placeholder="Farmer Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>

    <button type="submit">Verify</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% endif %}

{% if step == 2 %}
<h2>Add Crop Details</h2>

<form method="POST">
    <input type="hidden" name="add_crop">
    <input type="hidden" name="farmer_id" value="{{ farmer.id }}">

    <select name="category" required>
        <option value="">Select Category</option>
        <option>Dry Storage</option>
        <option>Cold Storage</option>
        <option>Industrial</option>
        <option>Forage</option>
    </select>

    <select name="crop_name" required>
        <option>Rice</option>
        <option>Wheat</option>
        <option>Maize</option>
        <option>Potato</option>
        <option>Onion</option>
        <option>Mango</option>
        <option>Banana</option>
        <option>Cotton</option>
        <option>Coffee</option>
    </select>

    <select name="season">
        <option>Kharif</option>
        <option>Rabi</option>
        <option>Zaid</option>
    </select>

    <input type="number" step="0.1" name="quantity" placeholder="Quantity (in Quintals)" required>
    <input type="number" step="0.01" name="base_price" placeholder="Your Selling Price (₹)" required>

    <input type="text" name="district" placeholder="District" required>
    <input type="text" name="state" placeholder="State" required>

    <button type="submit">Add Crop</button>
</form>
{% endif %}

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farmer Registration | Agri ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRTsUyooTypIyH4cjrvLr7T42AArpmqZyseHw&s') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Segoe UI', sans-serif;
}

/* Dark Overlay */
.overlay{
    background: rgba(0,0,0,0.65);
    min-height: 100vh;
    padding-top: 40px;
    padding-bottom: 40px;
}

/* Glass Card */
.card{
    background: rgba(255,255,255,0.95);
    border-radius: 25px;
    backdrop-filter: blur(10px);
    animation: fadeIn 0.8s ease-in-out;
}

/* Steps */
.step{
    display:none;
    animation: slideIn 0.5s ease;
}

.step.active{
    display:block;
}

@keyframes slideIn{
    from{opacity:0; transform:translateX(40px);}
    to{opacity:1; transform:translateX(0);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* Option Cards */
.option-card{
    cursor:pointer;
    border-radius:20px;
    transition:0.3s ease;
    border:3px solid transparent;
    background:white;
    padding:10px;
}

.option-card img{
    height:150px;
    width:100%;
    object-fit:cover;
    border-radius:15px;
}

.option-card:hover{
    transform:scale(1.05);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

input[type="radio"]{
    display:none;
}

input[type="radio"]:checked + .option-card{
    border:3px solid #198754;
    box-shadow:0 0 15px #198754;
}

/* Buttons */
.btn-nav{
    width:140px;
    border-radius:30px;
}

/* Progress Bar */
.progress{
    height:8px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="overlay">
<div class="container">
<div class="card p-4 shadow-lg">

<h3 class="text-center text-success mb-3">🌾 Farmer Registration</h3>

<div class="progress mb-4">
<div class="progress-bar bg-success" id="progressBar" style="width:33%"></div>
</div>

<form method="POST">

<!-- ================= STEP 1 ================= -->
<div class="step active" id="step1">

<div class="mb-3">
<label>👨‍🌾 Farmer Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>📞 Phone</label>
<input type="text" name="phone" pattern="[0-9]{10}" maxlength="10" class="form-control" required>
<small class="text-muted">10 digits only</small>
</div>

<div class="mb-3">
<label>🏠 Address</label>
<input type="text" name="address" class="form-control" required>
</div>

<div class="mb-3">
<label>🌱 Land Area (Acres)</label>
<input type="number" step="0.01" name="land_area" class="form-control" required>
</div>

<div class="text-end">
<button type="button" class="btn btn-success btn-nav" onclick="nextStep(2)">Next ➜</button>
</div>

</div>


<!-- ================= STEP 2 ================= -->
<div class="step" id="step2">

<h5 class="mb-3 text-center">🌾 Select Soil Type</h5>

<div class="row g-4">

<div class="col-6 col-md-3">
<label>
<input type="radio" name="soil_type" value="Black Soil" required>
<div class="option-card text-center">
<img src="https://m.media-amazon.com/images/I/51ztIGI+9CL.jpg">
<p class="mt-2 fw-bold">Black Soil</p>
</div>
</label>
</div>

<div class="col-6 col-md-3">
<label>
<input type="radio" name="soil_type" value="Red Soil">
<div class="option-card text-center">
<img src="https://5.imimg.com/data5/ANDROID/Default/2025/6/515487700/BS/BP/BU/79355904/product-jpeg-500x500.jpg">
<p class="mt-2 fw-bold">Red Soil</p>
</div>
</label>
</div>

<div class="col-6 col-md-3">
<label>
<input type="radio" name="soil_type" value="Sandy Soil">
<div class="option-card text-center">
<img src="https://ecogardener.com/cdn/shop/articles/Improving_Sandy_Soil_Choosing_a_Soil_Amendment-min.jpg?v=1767593931">
<p class="mt-2 fw-bold">Sandy Soil</p>
</div>
</label>
</div>

<div class="col-6 col-md-3">
<label>
<input type="radio" name="soil_type" value="Aluminium Soil">
<div class="option-card text-center">
<img src="https://5.imimg.com/data5/SELLER/Default/2023/12/366797699/LH/YH/CS/62826163/laterite-a-500x500.jpeg">
<p class="mt-2 fw-bold">Aluminium Soil</p>
</div>
</label>
</div>

</div>

<div class="d-flex justify-content-between mt-4">
<button type="button" class="btn btn-secondary btn-nav" onclick="nextStep(1)">⬅ Back</button>
<button type="button" class="btn btn-success btn-nav" onclick="nextStep(3)">Next ➜</button>
</div>

</div>


<!-- ================= STEP 3 ================= -->
<div class="step" id="step3">

<h5 class="mb-4 text-center">💧 Select Irrigation Type</h5>

<div class="row g-4 justify-content-center">

<div class="col-md-4">
<label>
<input type="radio" name="irrigation" value="Drip" required>
<div class="option-card text-center">
<img src="https://agri-route.com/cdn/shop/articles/why-drip-irrigation-not-popular-in-pakistan-despite-subsidies-1619523401-3405.jpg?v=1683711136">
<p class="mt-2 fw-bold">Drip Irrigation</p>
</div>
</label>
</div>

<div class="col-md-4">
<label>
<input type="radio" name="irrigation" value="Sprinkler">
<div class="option-card text-center">
<img src="https://automatworld.in/india/public/admin/assets/images/automat/Blog_thumbnail/1718112762-13-dec-23.jpg">
<p class="mt-2 fw-bold">Sprinkler</p>
</div>
</label>
</div>

<div class="col-md-4">
<label>
<input type="radio" name="irrigation" value="Canal">
<div class="option-card text-center">
<img src="https://assets-news.housing.com/news/wp-content/uploads/2022/10/14070049/CANAL-IRRIGATION-FEATURE-compressed.jpg">
<p class="mt-2 fw-bold">Canal Irrigation</p>
</div>
</label>
</div>

</div>

<div class="d-flex justify-content-between mt-4">
<button type="button" class="btn btn-secondary btn-nav" onclick="nextStep(2)">⬅ Back</button>
<button type="submit" class="btn btn-success btn-nav">Submit ✔</button>
</div>

</div>

</form>
</div>
</div>
</div>

<script>

function nextStep(step){
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById("step"+step).classList.add("active");

    // Progress bar control
    const progress = document.getElementById("progressBar");
    if(step==1) progress.style.width="33%";
    if(step==2) progress.style.width="66%";
    if(step==3) progress.style.width="100%";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Sell Crop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTX1M1xEdRnfnybSWW8VQS95X1cEA3s7SzmnQ&s") no-repeat center/cover;
}

.container{
    width:450px;
    margin:80px auto;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.crop-box{
    background:rgba(255,255,255,0.2);
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

label{
    font-weight:600;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e8449;
}

.back-btn{
    margin-top:10px;
    background:#3498db;
}

.back-btn:hover{
    background:#2c80b4;
}

</style>
</head>

<body>

{% include "navbar.html" %}

<div class="container">

<h2>Sell Crop</h2>

<div class="crop-box">
<p><strong>Crop Name:</strong> {{ crop.crop_name }}</p>
<p><strong>Available Quantity:</strong> {{ crop.quantity }} Quintals</p>
</div>

<form method="POST">

<label>Quantity to Sell</label>
<input type="number" name="quantity_sold" min="1" max="{{ crop.quantity }}" required>

<label>Price Per Quintal</label>
<input type="number" step="0.01" name="price_per_unit" required>

<button type="submit">Sell Crop</button>

</form>

<a href="/crops">
<button class="back-btn">Back to Crops</button>
</a>

</div>

</body>
</html>

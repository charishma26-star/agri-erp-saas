```html
<!DOCTYPE html>
<html>
<head>
<title>Edit Crop</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.container{
width:400px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2ecc71;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Edit Crop</h2>

<form method="POST">

Crop Name
<input type="text" name="crop_name" value="{{ crop.crop_name }}" required>

Quantity (Quintal)
<input type="number" step="0.1" name="quantity" value="{{ crop.quantity }}" required>

Base Price
<input type="number" step="0.1" name="base_price" value="{{ crop.base_price }}" required>

Status
<select name="status">

<option value="High" {% if crop.status=="High" %}selected{% endif %}>High</option>

<option value="Low" {% if crop.status=="Low" %}selected{% endif %}>Low</option>

<option value="Fair" {% if crop.status=="Fair" %}selected{% endif %}>Fair</option>

<option value="Unavailable" {% if crop.status=="Unavailable" %}selected{% endif %}>Unavailable</option>

</select>

<button type="submit">Update Crop</button>

</form>

</div>

</body>
</html>
```

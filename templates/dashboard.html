<!DOCTYPE html>
<html>
<head>
    <title>Agri ERP Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>
    <style>
    body.dark-mode {
        background-color: #121212 !important;
        color: white !important;
    }

    body.dark-mode .bg-light {
        background-color: #1e1e1e !important;
    }

    body.dark-mode .card {
        background-color: #2c2c2c;
        color: white;
    }

    body.dark-mode .bg-success {
        background-color: #0f5132 !important;
    }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- 🔥 SIDEBAR -->
    <div class="bg-success text-white p-3 vh-100" style="width: 240px;">
        <h4 class="fw-bold">🌾 Agri ERP</h4>
        <hr class="bg-light">

        <ul class="nav flex-column">

            <li class="nav-item mb-2">
                <a href="/" class="nav-link text-white">Dashboard</a>
            </li>

            <li class="nav-item mb-2">
                <a href="/add_farmer" class="nav-link text-white">Add Farmer</a>
            </li>

            <li class="nav-item mb-2">
                <a href="/add_crop" class="nav-link text-white">Add Crop</a>
            </li>

            <li class="nav-item mb-2">
                <a href="/add_expense" class="nav-link text-white">Add Expense</a>
            </li>

            <li class="nav-item mb-2">
                <a href="/farmer_report" class="nav-link text-white">Reports</a>
            </li>

            <li class="nav-item mt-4">
                <a href="/logout" class="nav-link text-warning fw-bold">Logout</a>
            </li>
                      
            <li class="nav-item mt-3">
                <button onclick="toggleDarkMode()" 
                        class="btn btn-light w-100">
                    🌙 Toggle Dark Mode
                </button>
            </li>
        </ul>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="flex-grow-1 p-4 bg-light">

        <h2 class="mb-4 text-success fw-bold">Dashboard Overview</h2>

        <!-- STAT CARDS -->
        <div class="row g-4 mb-4">

            <div class="col-md-3">
                <div class="card shadow border-0">
                    <div class="card-body text-center">
                        <h6>Total Farmers</h6>
                        <h3 class="text-success">{{ total_farmers }}</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow border-0">
                    <div class="card-body text-center">
                        <h6>Total Crops</h6>
                        <h3 class="text-primary">{{ total_crops }}</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow border-0">
                    <div class="card-body text-center">
                        <h6>Total Revenue</h6>
                        <h3 class="text-success">₹ {{ total_revenue }}</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow border-0">
                    <div class="card-body text-center">
                        <h6>Net Profit</h6>
                        <h3 class="text-dark">₹ {{ net_profit }}</h3>
                    </div>
                </div>
            </div>

        </div>

        <!-- CHARTS SECTION -->
        <div class="row g-4">

            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-body">
                        <h5 class="mb-3">📊 Monthly Revenue</h5>
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-body">
                        <h5 class="mb-3">🏆 Profit Per Farmer</h5>
                        <canvas id="profitChart"></canvas>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Charts Script -->
<script>

    // Monthly Revenue Chart
    new Chart(document.getElementById('revenueChart'), {
        type: 'bar',
        data: {
            labels: {{ months | tojson }},
            datasets: [{
                label: 'Monthly Revenue',
                data: {{ revenues | tojson }},
                backgroundColor: '#198754'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });

    // Profit Per Farmer Chart
    new Chart(document.getElementById('profitChart'), {
        type: 'bar',
        data: {
            labels: {{ farmer_names | tojson }},
            datasets: [{
                label: 'Net Profit',
                data: {{ farmer_profits | tojson }},
                backgroundColor: '#0d6efd'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("theme", "dark");
        } else {
            localStorage.setItem("theme", "light");
        }
    }
    window.onload = function() {
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
        }
    }
</script>

</body>
</html>
